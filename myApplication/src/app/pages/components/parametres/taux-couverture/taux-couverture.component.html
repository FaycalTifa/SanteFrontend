<!-- pages/components/uab/parametres/taux-couverture/taux-couverture.component.html -->
<div class="p-grid">
    <div class="p-col-12">
        <div class="card">
            <div class="card-header">
                <div class="header-title">
                    <i class="pi pi-percentage" style="font-size: 1.5rem; margin-right: 0.5rem;"></i>
                    <div>
                        <h2>Gestion des taux de couverture</h2>
                        <p>Paramétrage des pourcentages de remboursement</p>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <button pButton label="Nouveau taux" icon="pi pi-plus" class="p-button-primary" (click)="openNewTaux()"></button>
            </div>

            <p-table
                    [value]="tauxList"
                    [loading]="loading"
                    [paginator]="true"
                    [rows]="10"
                    [rowsPerPageOptions]="[5,10,20]"
                    responsiveLayout="scroll">
                <ng-template pTemplate="header">
                    <tr>
                        <th>Code</th>
                        <th>Libellé</th>
                        <th>Taux (%)</th>
                        <th style="width: 120px">Actions</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-taux>
                    <tr>
                        <td><strong>{{ taux.code }}</strong></td>
                        <td>{{ taux.libelle }}</td>
                        <td>
                            <span class="taux-value">{{ taux.tauxPourcentage }}%</span>
                        </td>
                        <td>
                            <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-text" (click)="editTaux(taux)" pTooltip="Modifier"></button>
                            <button pButton icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger" (click)="deleteTaux(taux)" pTooltip="Supprimer"></button>
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="4" class="text-center">Aucun taux de couverture enregistré</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>

<!-- Dialog Création/Modification Taux -->
<p-dialog
        header="{{ selectedTaux ? 'Modifier le taux' : 'Nouveau taux' }}"
        [(visible)]="displayTauxDialog"
        [modal]="true"
        [style]="{width: '500px'}"
        [draggable]="false">
    <form [formGroup]="tauxForm">
        <div class="p-fluid">
            <div class="field">
                <label for="code">Code *</label>
                <input id="code" type="text" pInputText formControlName="code">
                <small class="p-error" *ngIf="tauxForm.get('code')?.invalid && tauxForm.get('code')?.touched">
                    Code requis (max 50 caractères)
                </small>
            </div>

            <div class="field">
                <label for="libelle">Libellé *</label>
                <input id="libelle" type="text" pInputText formControlName="libelle">
                <small class="p-error" *ngif="tauxForm.get('libelle')?.invalid && tauxForm.get('libelle')?.touched">
                    Libellé requis (max 100 caractères)
                </small>
            </div>

            <div class="field">
                <label for="tauxPourcentage">Taux (%) *</label>
                <div class="p-inputgroup">
                    <input id="tauxPourcentage" type="number" pInputText formControlName="tauxPourcentage">
                    <span class="p-inputgroup-addon">%</span>
                </div>
                <small class="p-error" *ngIf="tauxForm.get('tauxPourcentage')?.invalid && tauxForm.get('tauxPourcentage')?.touched">
                    Taux entre 0 et 100%
                </small>
            </div>
        </div>
    </form>
    <ng-template pTemplate="footer">
        <button pButton label="Annuler" icon="pi pi-times" class="p-button-text" (click)="displayTauxDialog = false"></button>
        <button pButton label="Enregistrer" icon="pi pi-save" class="p-button-primary" (click)="saveTaux()" [loading]="loading"></button>
    </ng-template>
</p-dialog>
<div class="laboratoire-container">
    <!-- ✅ AJOUTER CETTE LIGNE POUR AFFICHER LES MESSAGES -->
    <p-toast position="top-right"></p-toast>

    <div class="card">
        <!-- reste du template -->
    </div>
</div>
<p-confirmDialog></p-confirmDialog>
