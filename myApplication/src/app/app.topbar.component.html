<!-- app.topbar.component.html -->
<div class="layout-topbar">
    <div class="layout-topbar-left">
        <a class="layout-topbar-logo" routerLink="/dashboard">
            <img id="app-logo" src="assets/layout/images/logo/UAB.jpeg" alt="UAB Assurances" style="height: 40px;">
            <span class="logo-text">UAB ASSURANCES</span>
        </a>

        <button class="layout-menu-button" (click)="appMain.onMenuButtonClick($event)" pRipple>
            <i class="pi pi-chevron-right"></i>
        </button>

        <button class="layout-topbar-mobile-button" (click)="toggleMobileMenu()" pRipple>
            <i class="pi pi-ellipsis-v"></i>
        </button>
    </div>

    <div class="layout-topbar-right">
        <div class="user-wrapper">
            <div class="user-info">
                <div class="user-details" *ngIf="currentUser">
                    <div class="user-name">{{currentUser.prenom}} {{currentUser.nom | uppercase}}</div>
                    <div class="user-role">{{getRoleLabel(currentUser.roles?.[0] || currentUser.role)}}</div>
                </div>
                <div class="user-details" *ngIf="!currentUser">
                    <div class="user-name">Non connecté</div>
                </div>
                <button pButton pRipple type="button"
                        icon="pi pi-power-off"
                        (click)="onLogout()"
                        class="p-button-rounded p-button-danger logout-btn"
                        pTooltip="Déconnexion"
                        tooltipPosition="bottom">
                </button>
            </div>
        </div>
    </div>
</div>
<!-- ✅ Dialogue de confirmation -->
<p-dialog header="Déconnexion" [(visible)]="displayLogoutDialog" [modal]="true"
          [style]="{width: '90%', maxWidth: '400px'}" [draggable]="false">
    <div class="text-center p-3">
        <i class="pi pi-exclamation-triangle" style="font-size: 3rem; color: #f39c12;"></i>
        <h3>Voulez-vous vraiment vous déconnecter ?</h3>
        <p>Vous serez redirigé vers la page de connexion.</p>
    </div>
    <ng-template pTemplate="footer">
        <button pButton label="Annuler" icon="pi pi-times" (click)="displayLogoutDialog = false"
                class="p-button-text"></button>
        <button pButton label="Se déconnecter" icon="pi pi-power-off" (click)="confirmLogout()"
                class="p-button-danger"></button>
    </ng-template>
</p-dialog>
